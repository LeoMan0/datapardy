<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataPardy — Setup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>DataPardy</h1>
    <div class="subtitle">Game Setup</div>
  </header>

  <div class="setup-container">

    <!-- Game Title -->
    <div class="setup-section">
      <h2>Game Info</h2>
      <div class="form-row">
        <div class="form-group" style="max-width:420px">
          <label for="gameTitle">Game Title</label>
          <input type="text" id="gameTitle" placeholder="My Jeopardy Game" maxlength="80">
        </div>
      </div>
    </div>

    <!-- Players -->
    <div class="setup-section">
      <h2>Players (up to 6)</h2>
      <div class="player-list" id="playerList"></div>
      <button class="btn btn-secondary btn-sm" onclick="addPlayer()" id="addPlayerBtn">+ Add Player</button>
    </div>

    <!-- Categories -->
    <div class="setup-section">
      <h2>Categories (up to 6)</h2>
      <div id="categoryList"></div>
      <button class="btn btn-secondary btn-sm" onclick="addCategory()" id="addCategoryBtn">+ Add Category</button>
    </div>

    <!-- Final Jeopardy -->
    <div class="setup-section">
      <h2>Final Jeopardy</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Category Name</label>
          <input type="text" id="finalCategory" placeholder="e.g. World History" maxlength="60">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Question</label>
          <textarea id="finalQuestion" placeholder="Enter the Final Jeopardy question..." rows="3"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Answer</label>
          <textarea id="finalAnswer" placeholder="Enter the answer..." rows="2"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="max-width:260px">
          <label>Image (optional)</label>
          <input type="file" id="finalImage" accept="image/*" onchange="handleFinalImage(event)" style="color:var(--tan)">
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <img id="finalImagePreview" class="image-preview hidden" alt="preview">
          <button class="image-clear hidden" id="finalImageClear" onclick="clearFinalImage()">✕ Remove</button>
        </div>
      </div>
    </div>

  </div><!-- end setup-container -->

  <div class="setup-actions">
    <button class="btn btn-secondary" onclick="location.href='index.html'">← Back</button>
    <button class="btn btn-secondary" onclick="loadFromFile()">📂 Load JSON</button>
    <input type="file" id="importFileInput" accept=".json" class="hidden" onchange="importJSON(event)">
    <button class="btn btn-secondary" onclick="saveToFile()">💾 Save JSON</button>
    <button class="btn btn-primary" onclick="startGame()">▶ Start Game</button>
  </div>

  <script src="js/setup.js"></script>
</body>
</html>
